    <ellipse cx="180" cy="215" rx="91" ry="105" fill="#edbd92" stroke="#654438" stroke-width="8"/>
    <path d="M88 183c-20-8-22-39 2-48m181 48c21-9 24-39 0-49" fill="none" stroke="#eef1ec" stroke-width="31" stroke-linecap="round"/>
    <path d="M109 155c11-37 45-57 72-58m67 60c-10-39-42-59-69-60" fill="none" stroke="#eef1ec" stroke-width="35" stroke-linecap="round"/>
    <ellipse cx="145" cy="205" rx="14" ry="11" fill="#fff" stroke="#49342d" stroke-width="5"/>
    <ellipse cx="216" cy="205" rx="14" ry="11" fill="#fff" stroke="#49342d" stroke-width="5"/>
    <circle cx="145" cy="206" r="5" fill="#263b35"/><circle cx="216" cy="206" r="5" fill="#263b35"/>
    <path d="M180 212l-10 40 26 1" fill="none" stroke="#9d6a54" stroke-width="7" stroke-linecap="round"/>
    <path d="M127 268q53 28 106 0" fill="none" stroke="#654438" stroke-width="7" stroke-linecap="round"/>
    <path d="M131 255q50-30 99 1" fill="none" stroke="#f3f1e8" stroke-width="20" stroke-linecap="round"/>
    <path d="M95 430c10-91 54-132 86-132 39 0 77 44 87 132" fill="#46715b"/>
