<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Einstein und Rubbia: Energie und Materie im Dialog</title>
  <desc id="desc">Zwei stilisierte Wissenschaftler stehen für Einsteins Formel und Rubbias Teilchenexperimente. Zwischen ihnen verbinden leuchtende Pfeile Energie und Materie.</desc>
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#183b32"/>
      <stop offset="0.52" stop-color="#315e50"/>
      <stop offset="1" stop-color="#142f29"/>
    </linearGradient>
    <radialGradient id="energy" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7b2"/>
      <stop offset="0.35" stop-color="#f7ca57"/>
      <stop offset="1" stop-color="#dc785f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#071b16" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="650" rx="34" fill="url(#space)"/>
  <g fill="#dcebe5" opacity="0.34">
    <circle cx="82" cy="82" r="4"/><circle cx="170" cy="130" r="3"/><circle cx="1038" cy="94" r="4"/>
