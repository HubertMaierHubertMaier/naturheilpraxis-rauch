<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Muheim-Gedankenmodell mit Allianz Arena und 3,6 Gramm Masse</title>
  <desc id="desc">Eine leuchtende Stadion-Silhouette steht für ein großes Energiefeld. Daneben zeigt eine kleine Präzisionswaage 3,6 Gramm sichtbare Masse.</desc>
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#102d27"/>
      <stop offset="0.62" stop-color="#285246"/>
      <stop offset="1" stop-color="#e7dfd1"/>
    </linearGradient>
    <linearGradient id="stadium" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8df85"/>
      <stop offset="0.48" stop-color="#ef9c76"/>
      <stop offset="1" stop-color="#c65f51"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7ae" stop-opacity="0.9"/>
      <stop offset="0.48" stop-color="#73c6ad" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#73c6ad" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#102d27" flood-opacity="0.3"/>
    </filter>
    <pattern id="diamonds" width="48" height="42" patternUnits="userSpaceOnUse">
      <path d="M24 1 47 21 24 41 1 21Z" fill="none" stroke="#fff8d0" stroke-width="3" opacity="0.78"/>
    </pattern>
  </defs>

  <rect width="1200" height="650" rx="34" fill="url(#night)"/>
  <g fill="#fff" opacity="0.5">
    <circle cx="75" cy="78" r="3"/><circle cx="168" cy="115" r="4"/><circle cx="316" cy="74" r="3"/>
    <circle cx="533" cy="106" r="4"/><circle cx="716" cy="61" r="3"/><circle cx="1090" cy="93" r="4"/>
  </g>

  <g transform="translate(55 78)">
    <ellipse cx="390" cy="275" rx="376" ry="240" fill="url(#field)" filter="url(#glow)"/>
    <g filter="url(#shadow)">
      <path d="M74 265C104 116 238 60 393 60c156 0 290 56 320 205l30 146c12 59-30 113-90 113H132c-60 0-102-54-90-113Z" fill="url(#stadium)" stroke="#fff1bd" stroke-width="9"/>
      <path d="M74 265C104 116 238 60 393 60c156 0 290 56 320 205l30 146c12 59-30 113-90 113H132c-60 0-102-54-90-113Z" fill="url(#diamonds)"/>
      <ellipse cx="393" cy="302" rx="265" ry="135" fill="#173d34" stroke="#fff1bd" stroke-width="12"/>
      <ellipse cx="393" cy="302" rx="198" ry="91" fill="#5a9c71" stroke="#d9f0df" stroke-width="8"/>
      <path d="M196 302h394M393 211v182" stroke="#d9f0df" stroke-width="5" opacity="0.8"/>
      <circle cx="393" cy="302" r="50" fill="none" stroke="#d9f0df" stroke-width="5"/>
    </g>
    <g fill="#fff7ae" filter="url(#glow)">
      <circle cx="92" cy="215" r="8"/><circle cx="147" cy="137" r="7"/><circle cx="251" cy="93" r="9"/>
      <circle cx="402" cy="63" r="8"/><circle cx="553" cy="101" r="7"/><circle cx="665" cy="181" r="9"/>
      <circle cx="723" cy="293" r="7"/><circle cx="688" cy="420" r="8"/><circle cx="155" cy="442" r="8"/>
    </g>
    <rect x="171" y="5" width="444" height="62" rx="22" fill="#143d33" stroke="#d9f0df" stroke-width="4"/>
    <text x="393" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" font-weight="800" fill="#fff7ae">ENERGIEFELD IM GEDANKENMODELL</text>
  </g>

  <g transform="translate(820 215)" filter="url(#shadow)">
    <rect x="0" y="0" width="315" height="310" rx="30" fill="#faf8f3" stroke="#46715b" stroke-width="8"/>
    <ellipse cx="158" cy="74" rx="105" ry="34" fill="#e8ece5" stroke="#46715b" stroke-width="7"/>
    <g fill="#fff" stroke="#d2b26b" stroke-width="2">
      <circle cx="112" cy="65" r="11"/><circle cx="139" cy="54" r="10"/><circle cx="165" cy="63" r="12"/>
      <circle cx="190" cy="53" r="9"/><circle cx="211" cy="67" r="11"/><circle cx="151" cy="78" r="10"/>
      <circle cx="181" cy="79" r="9"/>
    </g>
    <path d="M158 108v35" stroke="#46715b" stroke-width="10"/>
    <rect x="47" y="140" width="222" height="115" rx="18" fill="#193b32"/>
    <text x="158" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="65" font-weight="800" fill="#fff7ae">3,6 g</text>
    <text x="158" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#315e50">SICHTBARE MASSE</text>
  </g>

  <path d="M765 338h66" stroke="#fff7ae" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <path d="m803 305 34 33-34 33" fill="none" stroke="#fff7ae" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(775 548)">
    <rect width="377" height="70" rx="20" fill="#fff1f0" stroke="#c66a51" stroke-width="5"/>
    <text x="188" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="800" fill="#7f352b">VERANSCHAULICHUNG, KEINE MESSUNG</text>
  </g>
</svg>
