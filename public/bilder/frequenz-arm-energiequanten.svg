<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Ein Arm als Feld aus Energiequanten</title>
  <desc id="desc">Ein stilisierter gebeugter Arm besteht aus vielen leuchtenden Punkten. Beschriftungen stellen einem Kilogramm Arm 974 Milliarden Energiequanten gegenüber.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f4ec"/>
      <stop offset="1" stop-color="#deebe5"/>
    </linearGradient>
    <linearGradient id="arm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#315e50"/>
      <stop offset="0.55" stop-color="#46715b"/>
      <stop offset="1" stop-color="#c66a51"/>
    </linearGradient>
    <pattern id="quanta" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="9" r="5" fill="#fff6ad"/>
      <circle cx="25" cy="22" r="4" fill="#cdebe1"/>
      <circle cx="10" cy="29" r="2.5" fill="#f3a98f"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#23443a" flood-opacity="0.22"/>
    </filter>
    <clipPath id="armShape">
      <path d="M196 448c45-104 111-172 187-209 41-20 83-26 122-17 67 15 110 74 100 139-7 46-38 85-82 104-49 21-104 14-143-18-40 44-76 92-105 145H112c22-53 50-101 84-144Zm284-156c-34-8-72 11-109 50 30 26 64 34 91 22 25-11 37-36 31-56-2-8-6-13-13-16Z"/>
      <path d="M501 220c47-118 96-171 160-177 50-5 96 25 112 72 16 46-2 95-43 122-35 23-79 28-125 14l-61 91-112-72 69-50Zm147-92c-17 3-34 23-53 61 26 6 48 3 61-6 12-8 17-22 13-34-3-11-11-23-21-21Z"/>
    </clipPath>
  </defs>

  <rect width="1200" height="650" rx="34" fill="url(#background)"/>
  <g opacity="0.2" fill="none" stroke="#46715b" stroke-width="3">
    <circle cx="463" cy="333" r="210"/><circle cx="463" cy="333" r="252"/><circle cx="463" cy="333" r="294"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M196 448c45-104 111-172 187-209 41-20 83-26 122-17 67 15 110 74 100 139-7 46-38 85-82 104-49 21-104 14-143-18-40 44-76 92-105 145H112c22-53 50-101 84-144Zm284-156c-34-8-72 11-109 50 30 26 64 34 91 22 25-11 37-36 31-56-2-8-6-13-13-16Z" fill="url(#arm)" stroke="#21463b" stroke-width="11" stroke-linejoin="round"/>
    <path d="M501 220c47-118 96-171 160-177 50-5 96 25 112 72 16 46-2 95-43 122-35 23-79 28-125 14l-61 91-112-72 69-50Zm147-92c-17 3-34 23-53 61 26 6 48 3 61-6 12-8 17-22 13-34-3-11-11-23-21-21Z" fill="url(#arm)" stroke="#21463b" stroke-width="11" stroke-linejoin="round"/>
    <rect x="75" y="20" width="750" height="590" fill="url(#quanta)" clip-path="url(#armShape)" opacity="0.9"/>
  </g>

  <g fill="#fff6ad" filter="url(#glow)">
    <circle cx="238" cy="420" r="8"/><circle cx="292" cy="346" r="7"/><circle cx="355" cy="294" r="9"/>
    <circle cx="437" cy="266" r="7"/><circle cx="515" cy="310" r="9"/><circle cx="480" cy="402" r="8"/>
    <circle cx="558" cy="205" r="7"/><circle cx="610" cy="128" r="9"/><circle cx="691" cy="97" r="8"/>
  </g>

  <g transform="translate(805 94)" filter="url(#shadow)">
    <rect width="320" height="145" rx="24" fill="#fff" stroke="#46715b" stroke-width="7"/>
    <text x="160" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#315e50">SICHTBARE MASSE</text>
    <text x="160" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="45" font-weight="800" fill="#c66a51">1 kg Arm</text>
  </g>

  <path d="M817 308h250" fill="none" stroke="#c66a51" stroke-width="12" stroke-linecap="round"/>
  <path d="M1035 275l42 33-42 33" fill="none" stroke="#c66a51" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(770 370)" filter="url(#shadow)">
    <rect width="380" height="185" rx="24" fill="#315e50"/>
    <text x="190" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#dcebe5">IM DENKMODELL</text>
    <text x="190" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="43" font-weight="800" fill="#fff6ad">974 Milliarden</text>
    <text x="190" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#fff">Energiequanten</text>
  </g>

  <text x="385" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#315e50">Ein leuchtendes Feld formt die sichtbare Struktur</text>
</svg>
